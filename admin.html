<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INSTRUCTOR PANEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Orbitron:wght@600;900&display=swap');
        :root { --bg: #05080f; --panel: #0d121d; --cyan: #00f3ff; --red: #ff003c; }
        body { background: var(--bg); color: #e0fbfc; font-family: 'Fira Code', monospace; padding: 40px; }
        .card { background: var(--panel); padding: 20px; border: 1px solid #1f3a5f; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .btn-broadcast { padding: 15px 30px; background: var(--red); color: white; border: none; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); }
        th, td { padding: 15px; border-bottom: 1px solid #1f3a5f; text-align: left; }
        th { color: var(--cyan); font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto;">
        <h1 style="font-family:'Orbitron';">COMMAND CENTER</h1>
        
        <div class="card" id="bc-card">
            <h3 id="bc-status">BROADCAST: INACTIVE</h3>
            <button class="btn-broadcast" onclick="toggleBroadcast(true)">ACTIVATE 'EYES FRONT'</button>
        </div>

        <div id="stats" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;"></div>

        <table>
            <thead><tr><th>RANK</th><th>STUDENT</th><th>SCORE</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        async function toggleBroadcast(status) {
            await fetch('/api', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ action: 'toggle_broadcast', status: status }) 
            });
            const btn = document.querySelector('.btn-broadcast');
            const txt = document.getElementById('bc-status');
            if(status) {
                btn.innerText = "STOP BROADCAST";
                btn.onclick = () => toggleBroadcast(false);
                txt.innerText = "BROADCAST: ACTIVE";
                txt.style.color = "var(--red)";
            } else {
                btn.innerText = "ACTIVATE 'EYES FRONT'";
                btn.onclick = () => toggleBroadcast(true);
                txt.innerText = "BROADCAST: INACTIVE";
                txt.style.color = "white";
            }
        }

        async function update() {
            const res = await fetch('/api');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.leaderboard.map((r, i) => `<tr><td>#${i+1}</td><td>${r.username}</td><td>${r.score}</td></tr>`).join('');
            const avg = data.leaderboard.length ? Math.round(data.leaderboard.reduce((a, b) => a + b.score, 0) / data.leaderboard.length) : 0;
            document.getElementById('stats').innerHTML = `
                <div class="card"><h2>${data.leaderboard.length}</h2><p>STUDENTS FINISHED</p></div>
                <div class="card"><h2>${avg}</h2><p>AVG CLASS SCORE</p></div>
            `;
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
