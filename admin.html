<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INSTRUCTOR PANEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Orbitron:wght@900&display=swap');
        body { background: #05080f; color: white; font-family: 'Fira Code'; padding: 20px; }
        .card { background: #0d121d; border: 1px solid #00f3ff; padding: 20px; margin: 10px; text-align: center; }
        .btn { padding: 15px; width: 100%; cursor: pointer; font-family: 'Orbitron'; margin: 5px; }
        .btn-green { background: #39ff14; }
        .btn-red { background: #ff003c; color: white; }
    </style>
</head>
<body>
    <h1 style="font-family:'Orbitron'; color:#00f3ff; text-align:center;">COMMAND CENTER</h1>
    <div style="display:grid; grid-template-columns: 1fr 1fr;">
        <div class="card">
            <h3>GAME LOCK</h3>
            <button class="btn btn-green" onclick="control('toggle_game', true)">START GAME</button>
            <button class="btn" onclick="control('toggle_game', false)">LOCK GAME</button>
        </div>
        <div class="card">
            <h3>BROADCAST</h3>
            <button class="btn btn-red" onclick="control('toggle_broadcast', true)">EYES FRONT</button>
            <button class="btn" onclick="control('toggle_broadcast', false)">STOP</button>
        </div>
    </div>
    <div class="card">
        <h3>LIVE LEADERBOARD</h3>
        <div id="list"></div>
    </div>

    <script>
        async function control(action, status) {
            await fetch('/api', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ action, status }) 
            });
        }
        async function update() {
            const res = await fetch('/api');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.leaderboard.map(r => `<div>${r.username}: ${r.score}</div>`).join('');
        }
        setInterval(update, 3000);
    </script>
</body>
</html>
