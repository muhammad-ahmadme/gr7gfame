<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INSTRUCTOR PANEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Orbitron:wght@600;900&display=swap');
        :root { --bg: #05080f; --panel: #0d121d; --cyan: #00f3ff; --red: #ff003c; --green: #39ff14; }
        body { background: var(--bg); color: #e0fbfc; font-family: 'Fira Code', monospace; padding: 40px; }
        .card { background: var(--panel); padding: 20px; border: 1px solid #1f3a5f; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .btn-action { padding: 15px 30px; color: white; border: none; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; transition: 0.2s;}
        .btn-action:hover { filter: brightness(1.2); }
        table { width: 100%; border-collapse: collapse; background: var(--panel); }
        th, td { padding: 15px; border-bottom: 1px solid #1f3a5f; text-align: left; }
        th { color: var(--cyan); font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto;">
        <h1 style="font-family:'Orbitron'; text-align: center; color: var(--cyan); margin-bottom: 30px;">COMMAND CENTER</h1>
        
        <div class="control-grid">
            <div class="card" style="border-color: var(--green);">
                <h3 id="gs-status">GAME STATUS: LOCKED</h3>
                <button class="btn-action" id="btn-start" style="background: var(--green); color: #000;" onclick="toggleGame(true)">START GAME FOR ALL</button>
            </div>
            
            <div class="card" style="border-color: var(--red);">
                <h3 id="bc-status">BROADCAST: INACTIVE</h3>
                <button class="btn-action" id="btn-broadcast" style="background: var(--red);" onclick="toggleBroadcast(true)">ACTIVATE 'EYES FRONT'</button>
            </div>
        </div>

        <div id="stats" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;"></div>

        <table>
            <thead><tr><th>RANK</th><th>STUDENT</th><th>SCORE</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        async function toggleGame(status) {
            await fetch('/api', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ action: 'toggle_game', status: status }) 
            });
            const btn = document.getElementById('btn-start');
            const txt = document.getElementById('gs-status');
            if(status) {
                btn.innerText = "LOCK GAME (STOP NEW STARTS)";
                btn.style.background = "#444";
                btn.style.color = "white";
                btn.onclick = () => toggleGame(false);
                txt.innerText = "GAME STATUS: RUNNING";
                txt.style.color = "var(--green)";
            } else {
                btn.innerText = "START GAME FOR ALL";
                btn.style.background = "var(--green)";
                btn.style.color = "#000";
                btn.onclick = () => toggleGame(true);
                txt.innerText = "GAME STATUS: LOCKED";
                txt.style.color = "white";
            }
        }

        async function toggleBroadcast(status) {
            await fetch('/api', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ action: 'toggle_broadcast', status: status }) 
            });
            const btn = document.getElementById('btn-broadcast');
            const txt = document.getElementById('bc-status');
            if(status) {
                btn.innerText = "STOP BROADCAST";
                btn.style.background = "#444";
                btn.onclick = () => toggleBroadcast(false);
                txt.innerText = "BROADCAST: ACTIVE";
                txt.style.color = "var(--red)";
            } else {
                btn.innerText = "ACTIVATE 'EYES FRONT'";
                btn.style.background = "var(--red)";
                btn.onclick = () => toggleBroadcast(true);
                txt.innerText = "BROADCAST: INACTIVE";
                txt.style.color = "white";
            }
        }

        async function update() {
            try {
                const res = await fetch('/api');
                const data = await res.json();
                
                // Update Leaderboard
                if(data.leaderboard) {
                    document.getElementById('list').innerHTML = data.leaderboard.map((r, i) => `<tr><td>#${i+1}</td><td>${r.username}</td><td>${r.score}</td></tr>`).join('');
                    const avg = data.leaderboard.length ? Math.round(data.leaderboard.reduce((a, b) => a + b.score, 0) / data.leaderboard.length) : 0;
                    document.getElementById('stats').innerHTML = `
                        <div class="card"><h2>${data.leaderboard.length}</h2><p style="color:var(--cyan); font-size: 0.8rem;">STUDENTS FINISHED</p></div>
                        <div class="card"><h2>${avg}</h2><p style="color:var(--cyan); font-size: 0.8rem;">AVG CLASS SCORE</p></div>
                    `;
                }
                
                // Sync UI with current server state on load/poll
                if(data.game_started !== undefined) {
                    const btnStart = document.getElementById('btn-start');
                    const txtStart = document.getElementById('gs-status');
                    if(data.game_started && btnStart.innerText === "START GAME FOR ALL") {
                        btnStart.innerText = "LOCK GAME (STOP NEW STARTS)";
                        btnStart.style.background = "#444";
                        btnStart.style.color = "white";
                        btnStart.onclick = () => toggleGame(false);
                        txtStart.innerText = "GAME STATUS: RUNNING";
                        txtStart.style.color = "var(--green)";
                    }
                }
            } catch (err) {
                console.error("Failed to sync stats", err);
            }
        }
        
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
