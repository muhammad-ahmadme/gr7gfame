<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER OPS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Orbitron:wght@600;900&display=swap');
        :root { --bg: #05080f; --panel: #0d121d; --cyan: #00f3ff; --red: #ff003c; --green: #39ff14; }
        body { background: var(--bg); color: #e0fbfc; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-box { width: 500px; padding: 40px; background: var(--panel); border: 2px solid var(--cyan); border-radius: 20px; text-align: center; position: relative; }
        .hud { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--cyan); font-family: 'Orbitron'; font-size: 0.8rem; }
        #q-area { min-height: 160px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border-radius: 10px; margin: 20px 0; padding: 20px; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid var(--green); background: transparent; color: var(--green); font-family: 'Orbitron'; cursor: pointer; font-weight: 900; }
        .btn-threat { border-color: var(--red); color: var(--red); }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--cyan); color: var(--cyan); text-align: center; margin-bottom: 20px; }
        #feedback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 15, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 18px; }
        .hidden { display: none !important; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1f3a5f; }
    </style>
</head>
<body>
<div id="game-box">
    <div id="feedback">
        <h1 id="fb-status" style="font-family:'Orbitron';"></h1>
        <p id="fb-note" style="padding: 20px;"></p>
        <button class="btn" onclick="nextQ()" style="width: 180px">CONTINUE</button>
    </div>
    <div id="login-screen">
        <h1 style="font-family:'Orbitron'; color: var(--cyan);">CYBER OPS</h1>
        <input type="text" id="username" placeholder="AGENT NAME">
        <button class="btn" onclick="start()">START MISSION</button>
    </div>
    <div id="play-screen" class="hidden">
        <div class="hud"><span>AGENT: <span id="hud-user"></span></span><span>SCORE: <span id="hud-score">0</span></span></div>
        <div id="q-area"><p id="q-text"></p></div>
        <button class="btn" onclick="check(true)">✅ LEGITIMATE</button>
        <button class="btn btn-threat" onclick="check(false)">☢️ THREAT</button>
    </div>
    <div id="end-screen" class="hidden">
        <h2 style="font-family:'Orbitron'; color: var(--cyan);">RANKINGS</h2>
        <div id="leaderboard"></div>
        <button class="btn" onclick="location.reload()">REPLAY</button>
    </div>
</div>
<script>
    let user = "", score = 0, idx = 0;
    const scenarios = [
        { t: "SMS: 'Your Roblox account will be deleted in 2 hours. Click to verify: roblox-fix.cc'", isL: false, n: "Phishing! Urgent threats are a classic scam tactic." },
        { t: "Email: 'Monthly school lunch menu for May is attached (menu.pdf)'.", isL: true, n: "Legit. School PDFs are generally safe." },
        { t: "Discord DM: 'I accidentally reported you! Contact this admin to stop the ban.'", isL: false, n: "The #1 Discord scam used to steal accounts." },
        { t: "MFA: Your phone asks to 'Approve Login' but you aren't trying to sign in.", isL: false, n: "MFA Fatigue. Someone has your password! Deny it." },
        { t: "A random person in a game offers 'Free Currency' if you share your screen.", isL: false, n: "Screen sharing can leak your private login tokens." },
        { t: "Email: 'Your Netflix payment failed. Update here: net-flix-billing.com'", isL: false, n: "Phishing. Check the URL: 'net-flix' is not 'netflix.com'." },
        { t: "A video call from your brother sounds like him, but his eyes look robotic.", isL: false, n: "Deepfake! AI mimics voices and faces now." },
        { t: "Public USB charging station at the airport has a 'Free High Speed' sign.", isL: false, n: "Juice Jacking. Data can be stolen through charging ports." },
        { t: "Windows: 'A critical security update is ready. Restart to stay protected.'", isL: true, n: "Safe. Always keep your system updated." },
        { t: "You find a 'Homework' USB drive in the hallway and plug it in.", isL: false, n: "Baiting. Mystery USBs can be malicious." }
    ];

    function start() {
        user = document.getElementById('username').value.trim();
        if(!user) return;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('hud-user').innerText = user;
        render();
    }

    function render() {
        if(idx >= scenarios.length) return end();
        document.getElementById('q-text').innerText = scenarios[idx].t;
        document.getElementById('feedback').style.display = 'none';
    }

    function check(choice) {
        const q = scenarios[idx];
        const fb = document.getElementById('feedback');
        fb.style.display = 'flex';
        if(choice === q.isL) {
            score += 100;
            document.getElementById('fb-status').innerText = "SUCCESS";
            document.getElementById('fb-status').style.color = "var(--green)";
        } else {
            document.getElementById('fb-status').innerText = "BREACH";
            document.getElementById('fb-status').style.color = "var(--red)";
        }
        document.getElementById('fb-note').innerText = q.n;
        document.getElementById('hud-score').innerText = score;
    }

    function nextQ() { idx++; render(); }

    async function end() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        await fetch('/api', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: user, score: score }) });
        const res = await fetch('/api');
        const data = await res.json();
        document.getElementById('leaderboard').innerHTML = data.map(r => `<div class="rank-item"><span>${r.username}</span><span>${r.score}</span></div>`).join('');
    }
</script>
</body>
</html>
