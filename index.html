<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER OPS: TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Orbitron:wght@600;900&display=swap');
        :root { --bg: #030509; --panel: #0a0f1a; --cyan: #00f3ff; --red: #ff003c; --green: #39ff14; }
        body { background: var(--bg); color: #e0fbfc; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #game-box { width: 550px; padding: 40px; background: var(--panel); border: 1px solid var(--cyan); border-radius: 5px; text-align: center; position: relative; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        .hud { display: flex; justify-content: space-between; border-bottom: 1px solid var(--cyan); padding-bottom: 10px; margin-bottom: 25px; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--cyan); }
        #q-area { min-height: 140px; display: flex; align-items: center; justify-content: center; background: rgba(0,243,255,0.03); border-left: 4px solid var(--cyan); margin: 20px 0; padding: 25px; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; background: transparent; border: 1px solid var(--green); color: var(--green); font-family: 'Orbitron'; cursor: pointer; font-weight: 900; clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0 30%); transition: 0.2s; }
        .btn:hover:not(:disabled) { background: rgba(57, 255, 20, 0.1); box-shadow: 0 0 15px var(--green); }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .btn-threat { border-color: var(--red); color: var(--red); }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--cyan); color: var(--cyan); text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        #feedback, #broadcast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #broadcast-overlay { background: var(--red); }
        .hidden { display: none !important; }
        .briefing-text { text-align: left; font-size: 0.75rem; line-height: 1.5; color: #bde0fe; margin-bottom: 20px; border: 1px solid rgba(0, 243, 255, 0.2); padding: 15px; background: rgba(0,0,0,0.2); }
        .admin-link { display: inline-block; margin-top: 15px; color: var(--cyan); opacity: 0.3; font-size: 0.6rem; text-decoration: none; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="broadcast-overlay">
    <h1 style="font-family:'Orbitron'; font-size:4rem; color:white; margin:0;">EYES FRONT</h1>
    <p style="color:white; font-size:1.5rem; letter-spacing:4px;">LOOK AT THE MEETING SCREEN</p>
</div>

<div id="game-box">
    <div id="feedback">
        <h1 id="fb-status" style="font-family:'Orbitron'; font-size: 3rem;"></h1>
        <p id="fb-note" style="padding: 30px; line-height: 1.6;"></p>
        <button class="btn" onclick="nextQ()" style="width: 200px">NEXT TASK</button>
    </div>

    <div id="login-screen">
        <h1 style="font-family:'Orbitron'; color: var(--cyan); font-size: 2.5rem;">CYBER OPS</h1>
        <input type="text" id="username" placeholder="AGENT_NAME" maxlength="15">
        <input type="password" id="passcode" placeholder="ACCESS_KEY">
        <button class="btn" onclick="authenticate()">INITIALIZE</button>
        <p id="login-err" style="color:var(--red); font-size:0.7rem; display:none;">ACCESS DENIED</p>
    </div>

    <div id="instructions-screen" class="hidden">
        <h2 style="font-family:'Orbitron'; color: var(--cyan);">MISSION BRIEFING</h2>
        <div class="briefing-text">
            <p>1. Analyze 20 packets. 2. Time: 5:00. 3. Use SECURE/THREAT protocols.</p>
            <p id="status-wait" style="color:var(--red); text-align:center; font-weight:bold;">AWAITING INSTRUCTOR START SIGNAL...</p>
        </div>
        <button id="start-btn" class="btn" onclick="beginMission()" disabled>LOCKED</button>
        <a href="/admin.html" class="admin-link">[ BYPASS_TO_ADMIN ]</a>
    </div>

    <div id="play-screen" class="hidden">
        <div class="hud">
            <span>ID: <span id="hud-user"></span></span>
            <span>TIME: <span id="hud-time">05:00</span></span>
            <span>UPLINK: <span id="hud-score">0</span></span>
        </div>
        <div id="q-area"><p id="q-text"></p></div>
        <button class="btn" onclick="check(true)">✅ SECURE</button>
        <button class="btn btn-threat" onclick="check(false)">☢️ THREAT</button>
    </div>

    <div id="end-screen" class="hidden">
        <h2 id="end-title" style="font-family:'Orbitron'; color: var(--cyan);">COMPLETE</h2>
        <div id="leaderboard"></div>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>
</div>

<script>
    let user = "", score = 0, idx = 0, timeLeft = 300, isPaused = false, timerInterval;
    const scenarios = [
        { t: "SMS: 'Your account is locked. Click roblox-verify.com'", isL: false, n: "Phishing! Check the URL carefully." },
        { t: "Email: 'May School Lunch Menu (pdf)'", isL: true, n: "Verified source." }
        // ... add the rest of your scenarios here
    ];

    function authenticate() {
        user = document.getElementById('username').value;
        if(document.getElementById('passcode').value === "G7-CYBER-2026") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('instructions-screen').classList.remove('hidden');
            syncWithDatabase();
        }
    }

    function syncWithDatabase() {
        setInterval(async () => {
            const res = await fetch('/api');
            const data = await res.json();
            
            // Handle Start Toggle
            const btn = document.getElementById('start-btn');
            const waitTxt = document.getElementById('status-wait');
            if(data.game_started) {
                btn.disabled = false; btn.innerText = "ACCEPT MISSION";
                waitTxt.innerText = "SYSTEM READY"; waitTxt.style.color = "var(--green)";
            }
            
            // Handle Broadcast
            document.getElementById('broadcast-overlay').style.display = data.broadcast ? 'flex' : 'none';
            isPaused = data.broadcast;
        }, 3000);
    }

    function beginMission() {
        document.getElementById('instructions-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('hud-user').innerText = user.toUpperCase();
        render();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('hud-time').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(timeLeft <= 0) end();
            }
        }, 1000);
    }

    function render() {
        if(idx >= scenarios.length) return end();
        document.getElementById('q-text').innerText = scenarios[idx].t;
        document.getElementById('feedback').style.display = 'none';
    }

    function check(choice) {
        if(choice === scenarios[idx].isL) score += 100;
        document.getElementById('feedback').style.display = 'flex';
        document.getElementById('fb-status').innerText = choice === scenarios[idx].isL ? "AUTHORIZED" : "BREACH";
        document.getElementById('fb-note').innerText = scenarios[idx].n;
        document.getElementById('hud-score').innerText = score;
    }

    function nextQ() { idx++; render(); }

    async function end() {
        clearInterval(timerInterval);
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        await fetch('/api', { method: 'POST', body: JSON.stringify({ username: user, score: score }), headers: {'Content-Type': 'application/json'} });
    }
</script>
</body>
</html>
